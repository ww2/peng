<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ERS Pension Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: monospace;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    h1 { margin-bottom: 0.5rem; }

    #reload-bar { margin: 0 0 1rem; font-size: 0.8rem; }

    /* ── Fieldsets ── */
    fieldset {
      border: 1px solid #bbb;
      border-radius: 3px;
      padding: 0.75rem 1rem 1rem;
      margin-bottom: 1rem;
    }

    fieldset[disabled] { opacity: 0.5; pointer-events: none; }

    legend {
      font-size: 0.8rem;
      color: #555;
      padding: 0 0.4rem;
    }

    /* ── Field grid inside Group 1 ── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 2rem;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 0.2rem; }
    .field label { font-size: 0.8rem; color: #555; }
    #picker-path { color: #999; }
    .field select,
    .field input[type="date"],
    .field input[type="number"] {
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.25rem;
      width: 100%;
    }

    .input-row { display: flex; gap: 0.4rem; align-items: center; }
    .input-row input { flex: 1; }

    .field-pair { display: flex; gap: 0.5rem; }
    .field-pair .field { flex: 1; }

    /* ── Manual AFC field ── */
    #group-earnings-input-manual .field { flex-direction: row; align-items: center; }
    #manual-afc { width: 9ch; }

    /* ── Gap warnings ── */
    #gap-warnings { margin-top: 0.5rem; font-size: 0.85rem; color: #c60; }
    #gap-warnings ul { margin: 0.15rem 0 0; padding-left: 1.5em; }

    /* ── Debug panel ── */
    #debug-panel {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #ccc;
    }

    /* ── Group 2 stacked layout ── */
    .or-divider {
      display: flex;
      flex-direction: row;
      align-items: center;
      color: #999;
      font-size: 0.8rem;
      gap: 0.5rem;
      margin: 0.75rem 0;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    /* ── AFC computed display ── */
    #afc-computed, #afc-date-range {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    /* ── Debug details ── */
    details { margin-top: 0.6rem; }
    details summary {
      cursor: pointer;
      color: #0066cc;
      font-size: 0.8rem;
      user-select: none;
    }
    details summary:hover { color: #004499; }
    details.disabled { pointer-events: none; opacity: 0.35; }
    .details-body { margin-top: 0.4rem; }

    /* ── Action row ── */
    #action-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    #clear-btn {
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.35rem 1rem;
      cursor: pointer;
    }

    #status-line { font-size: 0.85rem; color: #c00; }
    #status-line:empty { display: none; }

    /* ── Chart legend ── */
    #chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-item svg { flex-shrink: 0; }

    /* ── Chart ── */
    #chart-svg {
      display: block;
      width: 100%;
      height: 520px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    /* ── Debug panels (populated in Stage 2) ── */
    .fields-out { background: #f5f5f5; border: 1px solid #ccc; padding: 0.5rem;
                  margin: 0; font-size: 0.8rem; white-space: pre; }
    .toggle-rows { margin: 0.25rem 0; font-size: 0.8rem; cursor: pointer;
                   color: #0066cc; background: none; border: none; padding: 0;
                   text-decoration: underline; }
    .debug-count { margin: 0.25rem 0; font-size: 0.8rem; }
    .dump-out { background: #f0f0f0; border: 1px solid #bbb; padding: 0.5rem;
                margin: 0; overflow: auto; max-height: 300px;
                font-size: 0.75rem; white-space: pre; }
    .filter-summary { font-family: monospace; font-size: 0.8rem; }
    .filter-summary pre { margin: 0; }
    .filter-summary ul { margin: 0; padding-left: 2em; }
    #files { list-style: none; padding: 0; margin: 0.5rem 0 0; }
    #files > li { margin: 0.15rem 0; }
    .file-link { cursor: pointer; color: #0066cc; text-decoration: underline; }
    .file-link:hover { color: #004499; }
    .file-output { margin: 0.25rem 0 0.5rem 1.5rem; }
    #json-out { background: #f5f5f5; border: 1px solid #ccc; padding: 0.75rem;
                overflow: auto; max-height: 400px; font-size: 0.75rem;
                white-space: pre; margin-top: 0.4rem; }
  </style>
</head>
<body>
  <h1>ERS Pension Graph</h1>
  <p id="reload-bar"><a id="reload-link" href="#">Reload</a></p>

  <!-- ── Group 1: Your information ───────────────────────────── -->
  <fieldset id="group-plan-input">
    <legend>Your information</legend>
    <div class="field-grid">

      <div class="field">
        <label for="plan">Plan</label>
        <select id="plan">
          <option value="">— select —</option>
          <option value="hybrid-post2012">Hybrid (joined July 2012 or later)</option>
          <option value="hybrid-pre2012">Hybrid (joined before July 2012)</option>
          <option value="contributory-post2012">Contributory (joined July 2012 or later)</option>
          <option value="contributory-pre2012">Contributory (joined before July 2012)</option>
          <option value="noncontributory">Noncontributory</option>
        </select>
      </div>

      <div class="field">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob">
      </div>

      <div>
        <div class="field-pair">
          <div class="field">
            <label for="svc-years">Credited service — years</label>
            <input type="number" id="svc-years" min="0" max="50" step="1" placeholder="0">
          </div>
          <div class="field">
            <label for="svc-months">months</label>
            <input type="number" id="svc-months" min="0" max="11" step="1" placeholder="0">
          </div>
        </div>
        <div class="field" id="svc-as-of-field" style="margin-top:0.4rem;">
          <label for="svc-as-of">Service credited as of</label>
          <input type="date" id="svc-as-of">
        </div>
      </div>

      <div class="field">
        <label for="last-day">Last day of service <em>(blank = still active)</em></label>
        <div class="input-row">
          <input type="date" id="last-day">
          <button type="button" id="last-day-clear" title="Clear">✕</button>
        </div>
      </div>

      <div style="grid-column: 1 / -1;">
        <div class="field-pair">
          <div class="field">
            <label for="sl-hours">Unused sick leave (hours)</label>
            <input type="number" id="sl-hours" min="0" step="1" placeholder="optional">
          </div>
          <div class="field">
            <label for="sl-rate">Sick leave accrual (hours/month)</label>
            <input type="number" id="sl-rate" min="0" step="0.5" value="14">
          </div>
        </div>
      </div>

      <div class="field">
        <label for="raise-rate">Annual pay raise (%)</label>
        <input type="number" id="raise-rate" min="0" max="20" step="0.1" placeholder="optional">
      </div>

    </div>
  </fieldset>

  <!-- ── Group 2: Earnings data ───────────────────────────────── -->
  <fieldset id="group-earnings-input" disabled>
    <legend>Earnings data</legend>

    <!-- Option B: manual AFC -->
    <div id="group-earnings-input-manual">
      <div class="field">
        <label for="manual-afc">Monthly AFC ($)</label>
        <input type="text" inputmode="decimal" id="manual-afc" placeholder="e.g. 4413.00">
      </div>
    </div>

    <div class="or-divider">or</div>

    <!-- Option A: paystub directory -->
    <div id="group-earnings-input-picker">
      <div id="picker-controls">
        <div class="field">
          <label for="picker-btn">Paystub directory<span id="picker-path"></span></label>
          <div>
            <button id="picker-btn" type="button">Choose directory…</button>
            <input type="file" id="picker" webkitdirectory accept=".pdf" style="display:none">
            <button id="cancel-btn" type="button" style="display:none">Cancel</button>
          </div>
        </div>
        <div id="afc-computed"></div>
        <div id="afc-date-range"></div>
        <div id="regular-earnings"></div>
        <div id="gap-warnings"></div>
      </div>
    </div>

    <div id="debug-panel" hidden>
      <details id="debug-details" class="disabled">
        <summary>Show paystub detail / Export JSON</summary>
        <div class="details-body" id="debug-body">
          <!-- populated in Stage 2 -->
        </div>
      </details>
    </div>

  </fieldset>

  <!-- ── Calculate ────────────────────────────────────────────── -->
  <div id="action-row">
    <button id="clear-btn" type="button">Clear</button>
    <span id="status-line"></span>
  </div>

  <!-- ── Chart legend ─────────────────────────────────────────── -->
  <div id="chart-legend">
    <span class="legend-item">
      <svg width="24" height="10"><rect width="24" height="10" fill="#e8e8e8"/></svg>
      Not yet vested
    </span>
    <span class="legend-item">
      <svg width="24" height="10"><rect width="24" height="10" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/></svg>
      Vested, not yet eligible
    </span>
    <span class="legend-item">
      <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#0066cc" stroke-width="1.5"/></svg>
      Pension at retirement
    </span>
    <span class="legend-item">
      <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#1a8c4e" stroke-width="1.5"/></svg>
      + current sick leave
    </span>
    <span class="legend-item">
      <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#72b572" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
      + projected sick leave (no usage)
    </span>
    <span class="legend-item">
      <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#cc6600" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
      COLA projection (on hover)
    </span>
  </div>

    // Age calculation used by the official calculator for the ARF table lookup.
    // Differs from fractionalAge(): days >= 15 rounds up to the next month.
    // Returns { year, month } where month is 0-based (Jan = 0).
    function officialArfAge(dob, retDate) {
      let dayDiff   = retDate.getDate()     - dob.getDate();
      let monthDiff = retDate.getMonth()    - dob.getMonth();
      let yearDiff  = retDate.getFullYear() - dob.getFullYear();
      if (dayDiff < 0)   { monthDiff -= 1; dayDiff  += 30; }
      if (monthDiff < 0) { monthDiff += 12; yearDiff -= 1; }
      if (dayDiff >= 15) { monthDiff += 1; }
      if (monthDiff >= 12) { yearDiff += 1; monthDiff -= 12; }
      return { year: yearDiff, month: monthDiff };
    }

    // Age calculation used by the official calculator for eligibility checks.
    // No day-rounding (unlike officialArfAge) — just carries borrows across months/years.
    // Returns { year, month, day } where day is the residual after borrow adjustment.
    function officialEligAge(dob, retDate) {
      let dayDiff   = retDate.getDate()     - dob.getDate();
      let monthDiff = retDate.getMonth()    - dob.getMonth();
      let yearDiff  = retDate.getFullYear() - dob.getFullYear();
      if (dayDiff < 0)   { monthDiff -= 1; dayDiff += 30; }
      if (monthDiff < 0) { monthDiff += 12; yearDiff -= 1; }
      return { year: yearDiff, month: monthDiff, day: dayDiff };
    }

    // Returns 'regular', 'early', or 'ineligible'.
    // eligAge must be the result of officialEligAge(dob, retDate).
    // svcYears is total credited service in whole years (Math.floor(svcMonths / 12)).
    function officialEligibility(plan, eligAge, svcYears) {
      const y   = eligAge.year;
      const pbd = eligAge.month * 30 + eligAge.day; // days past birthday; >0 means past exact birthday
      switch (plan) {
        case 'noncontributory':
          if (((y > 62 || (y === 62 && pbd > 0)) && svcYears >= 10) || (y >= 55 && svcYears >= 30))
            return 'regular';
          if (y >= 55 && svcYears >= 20) return 'early';
          return 'ineligible';
        case 'hybrid-pre2012':
          if ((y >= 62 && svcYears >= 5) || (y >= 55 && svcYears >= 30)) return 'regular';
          if (y >= 55 && svcYears >= 20) return 'early';
          return 'ineligible';
        case 'hybrid-post2012':
          if ((y >= 65 && svcYears >= 10) || (y >= 60 && svcYears >= 30)) return 'regular';
          if (y >= 55 && svcYears >= 20) return 'early';
          return 'ineligible';
        case 'contributory-pre2012':
          if (y >= 55 && svcYears >= 5) return 'regular';
          if (svcYears >= 25) return 'early';
          return 'ineligible';
        case 'contributory-post2012':
          if (y >= 60 && svcYears >= 10) return 'regular';
          if (y >= 55 && svcYears >= 25) return 'early';
          return 'ineligible';
        default: return 'ineligible';
      }
    }

    // Returns the Age Reduction Factor from the official lookup tables.
    // arfYear/arfMonth must come from officialArfAge().
    function officialARF(eligibility, plan, arfYear, arfMonth) {
      if (eligibility === 'regular')    return 1;
      if (eligibility === 'ineligible') return 0;
      const tier     = plan.endsWith('post2012') ? 'tier2' : 'tier1';
      const tableKey = plan.startsWith('hybrid')        ? 'tableH'
                     : plan === 'noncontributory'        ? 'tableNonCon'
                     :                                    'tableCon1';
      return OFFICIAL_ARF_TABLES[tier]?.[tableKey]?.[arfYear]?.[arfMonth] ?? 1;
    }

    // ── PDF parsing constants ─────────────────────────────────────

    const GAP_THRESHOLD = 30;

    const ALIASES = {
      'Overtime':   'Ordinary Overtime',
      'Night Shft': 'Night Shift Differential',
      'Holiday Py': 'Holiday Overtime Pay',
      'Frng Retro': 'Fringe Retro',
      'Gros Retro': 'Gross Retro',
    };

    const REVERSED_ALIASES = Object.fromEntries(
      Object.entries(ALIASES).map(([old, canonical]) => [canonical, old])
    );

    const KNOWN = new Set([
      'Regular',
      'Ordinary Overtime',
      'Night Shift Differential',
      'Holiday Overtime Pay',
      'Fringe Retro',
      'Gross Retro',
      'Temporary Hazard Pay',
      'Taxable WIK',
      'Tax WIK',
      'BNS Retro',
      'Bonus RetroPay Dues Eligible',
    ]);

    const IGNORED = new Set([
      'Temporary Hazard Pay',
      'Taxable WIK',
      'Tax WIK',
      'BNS Retro',
      'Bonus RetroPay Dues Eligible',
    ]);

    // ── PDF parsing functions ─────────────────────────────────────

    function reconstructRows(allItems) {
      const rows = [];
      for (const item of allItems) {
        if (!item.str.trim()) continue;
        const y = item.transform[5];
        const x = item.transform[4];
        const row = rows.find(r => Math.abs(r.y - y) <= 2);
        if (row) {
          row.items.push({ str: item.str, x, width: item.width });
        } else {
          rows.push({ y, items: [{ str: item.str, x, width: item.width }] });
        }
      }
      rows.sort((a, b) => b.y - a.y);
      rows.forEach(r => r.items.sort((a, b) => a.x - b.x));
      return rows;
    }

    function rowToString(items) {
      if (!items.length) return '';
      const parts = [items[0].str];
      for (let i = 1; i < items.length; i++) {
        const airGap = items[i].x - (items[i-1].x + items[i-1].width);
        if (airGap > GAP_THRESHOLD) parts.push('—');
        parts.push(items[i].str);
      }
      return parts.join('  |  ');
    }

    function parseHeader(rows) {
      let payBeginDate, payEndDate, issueDate, documentNumber, documentType = 'advice';
      for (const { items } of rows) {
        const line = items.map(i => i.str).join(' ');
        let m;
        if ((m = line.match(/Pay Begin Date:\s+(\d{2}\/\d{2}\/\d{4})/))) payBeginDate   = m[1];
        if ((m = line.match(/Pay End Date:\s+(\d{2}\/\d{2}\/\d{4})/)))   payEndDate     = m[1];
        if ((m = line.match(/Advice Date:\s+(\d{2}\/\d{2}\/\d{4})/)))    issueDate      = m[1];
        if ((m = line.match(/Check Date:\s+(\d{2}\/\d{2}\/\d{4})/)))   { issueDate      = m[1]; documentType = 'check'; }
        if ((m = line.match(/Advice #:\s+(\d+)/)))                        documentNumber = m[1];
        if ((m = line.match(/Check #:\s+(\d+)/)))                       { documentNumber = m[1]; documentType = 'check'; }
      }
      return { payBeginDate, payEndDate, issueDate, documentType, documentNumber };
    }

    function findEarningsBlock(rows) {
      let sectionIdx = -1, headerIdx = -1, totalIdx = -1;
      for (let i = 0; i < rows.length; i++) {
        const line = rows[i].items.map(it => it.str).join(' ');
        if (sectionIdx < 0 && line.includes('HOURS AND EARNINGS')) {
          sectionIdx = i;
        } else if (sectionIdx >= 0 && headerIdx < 0 &&
                   /Description\s.*Rate\s.*Hours\s.*Earnings/.test(line)) {
          headerIdx = i;
        } else if (headerIdx >= 0 && totalIdx < 0 &&
                   line.trimStart().startsWith('TOTAL:')) {
          totalIdx = i;
        }
      }
      return { sectionIdx, headerIdx, totalIdx };
    }

    function findTaxBoundaryX(rows, headerIdx) {
      if (headerIdx < 0) return Infinity;
      let seen = 0;
      for (const item of rows[headerIdx].items) {
        if (item.str === 'Description' && ++seen === 2) return item.x;
      }
      return Infinity;
    }

    function parseEarnings(rows, headerIdx, totalIdx) {
      const currentEarnings = {};
      const ytdEarnings     = {};
      const warnings        = [];
      const moneyRe         = /^[\d,]+\.\d{2}$/;
      const taxBoundaryX    = findTaxBoundaryX(rows, headerIdx);

      for (let i = headerIdx + 1; i < totalIdx; i++) {
        const items = rows[i].items.filter(it => it.x < taxBoundaryX);
        if (!items.length) continue;
        if (items[0].str.trimStart().startsWith('-')) continue;
        if (!/^[A-Za-z]/.test(items[0].str)) continue;

        const descItems = [items[0]];
        for (let j = 1; j < items.length; j++) {
          const gap = items[j].x - (items[j-1].x + items[j-1].width);
          if (gap > GAP_THRESHOLD) break;
          descItems.push(items[j]);
        }
        const rawDesc     = descItems.map(it => it.str).join(' ').trim();
        const description = ALIASES[rawDesc] ?? rawDesc;

        if (!KNOWN.has(description)) {
          warnings.push(`unknown earning type '${rawDesc}'`);
          console.warn(`unknown earning type '${rawDesc}'`);
        }

        const values = items
          .slice(descItems.length)
          .filter(it => moneyRe.test(it.str))
          .map(it => Number(it.str.replace(/,/g, '')));

        if (values.length > 0)
          currentEarnings[description] = (currentEarnings[description] ?? 0) + values[0];
        if (values.length > 1)
          ytdEarnings[description] = (ytdEarnings[description] ?? 0) + values[1];
      }

      const sortKeys = obj => Object.fromEntries(Object.entries(obj).sort(([a], [b]) => a.localeCompare(b)));
      return { currentEarnings: sortKeys(currentEarnings), ytdEarnings: sortKeys(ytdEarnings), warnings };
    }

    // ── Core extraction ──────────────────────────────────────────

    async function extractPaystub(file) {
      const buffer   = await file.arrayBuffer();
      const pdf      = await pdfjsLib.getDocument({ data: buffer }).promise;
      const allItems = [];
      for (let p = 1; p <= pdf.numPages; p++) {
        const page    = await pdf.getPage(p);
        const content = await page.getTextContent();
        allItems.push(...content.items);
      }

      const rows    = reconstructRows(allItems);
      const header  = parseHeader(rows);
      const block   = findEarningsBlock(rows);
      const { currentEarnings, ytdEarnings, warnings } =
        (block.headerIdx >= 0 && block.totalIdx >= 0)
          ? parseEarnings(rows, block.headerIdx, block.totalIdx)
          : { currentEarnings: {}, ytdEarnings: {}, warnings: ['earnings block not found'] };

      return {
        file           : file.webkitRelativePath,
        payBeginDate   : header.payBeginDate,
        payEndDate     : header.payEndDate,
        issueDate      : header.issueDate,
        documentType   : header.documentType,
        documentNumber : header.documentNumber,
        currentEarnings,
        ytdEarnings,
        _rows    : rows,
        _block   : block,
        _warnings: warnings,
      };
    }

    // ── Date utilities ───────────────────────────────────────────
    // Reformat MM/dd/yyyy → yyyy/MM/dd for display.
    function toYmd(s) { const [m, d, y] = s.split('/'); return `${y}/${m}/${d}`; }

    // Parse MM/dd/yyyy → Date
    function parseDate(s) {
      const [m, d, y] = s.split('/');
      return new Date(+y, +m - 1, +d);
    }

    function addMonths(date, n) {
      const d = new Date(date);
      const targetMonth = ((d.getMonth() + n) % 12 + 12) % 12;
      d.setMonth(d.getMonth() + n);
      // If the day overflowed into the wrong month, clamp to the last day of the intended month.
      if (d.getMonth() !== targetMonth) d.setDate(0);
      return d;
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    // Format Date → MM/dd/yyyy
    function fmtDate(date) {
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${m}/${d}/${date.getFullYear()}`;
    }

    // Whole calendar months from a to b (negative if b < a).
    // Uses addMonths for boundary check so Jan 31 → Feb 28 = 1 month.
    function monthsBetween(a, b) {
      let m = (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
      if (addMonths(a, m) > b) m--;
      return m;
    }

    // Age in fractional years (month-level precision).
    function fractionalAge(dob, date) {
      return monthsBetween(dob, date) / 12;
    }

    // Credited service at a candidate retirement month.
    // enteredMonths: service figure as of asOfDate (from ERS website or last day)
    // asOfDate: reference date for the entered figure
    // retDate: candidate retirement month (1st of month)
    // lastDayOfSvc: optional — caps accrual; null = still active
    function serviceAtMonth(enteredMonths, asOfDate, retDate, lastDayOfSvc) {
      const accrualEnd = lastDayOfSvc
        ? new Date(Math.min(lastDayOfSvc.getTime(), retDate.getTime()))
        : retDate;
      return enteredMonths + Math.max(0, monthsBetween(asOfDate, accrualEnd));
    }

    // Parse YYYY-MM-DD (from <input type="date">) as a local date.
    function parseIsoDate(s) {
      const [y, m, d] = s.split('-');
      return new Date(+y, +m - 1, +d);
    }

    // Convert unused sick leave hours to credited service months per ERS rules.
    // Requires ≥ 60 days (480 hrs); 60 days → 3 months, each further 20 days → 1 month,
    // remainder ≥ 10 days → 1 extra month.
    function sickLeaveToMonths(hours) {
      const days = hours / 8;
      if (days < 60) return 0;
      const whole     = Math.floor(days / 20);
      const remainder = days % 20;
      return whole + (remainder >= 10 ? 1 : 0);
    }

    // ── Pension series ───────────────────────────────────────────
    // Returns an array of rows, one per candidate retirement month, from the
    // 1st of next month through 10 years past the first normal retirement month.
    function calculateSeries({ plan, dob, enteredSvcMonths, asOfDate, lastDayOfSvc, afcMonthly, slHours, slRate, slAsOf, raiseRate = 0 }) {
      const config = PLAN_CONFIGS[plan];
      const today  = new Date();
      const start  = new Date(today.getFullYear(), today.getMonth() + 1, 1);

      const rows = [];
      let firstNormalDate = null;

      for (let m = 0; m < 600; m++) {   // 50-year hard ceiling
        const retDate = addMonths(start, m);
        const svcAtM  = serviceAtMonth(enteredSvcMonths, asOfDate, retDate, lastDayOfSvc);
        const ageAtM  = fractionalAge(dob, retDate);

        let isNormal, isEarly, normalRetAge;
        switch (plan) {
          case 'hybrid-post2012':
            // Normal: 65/10 yos OR 60/30 yos.  Early: 55/20 yos.
            isNormal     = (ageAtM >= 65 && svcAtM >= 120) || (ageAtM >= 60 && svcAtM >= 360);
            isEarly      = !isNormal && ageAtM >= 55 && svcAtM >= 240;
            normalRetAge = svcAtM >= 360 ? 60 : 65;
            break;
          case 'hybrid-pre2012':
            // Normal: 62/5 yos OR 55/30 yos.  Early: 55/20 yos.
            isNormal     = (ageAtM >= 62 && svcAtM >= 60) || (ageAtM >= 55 && svcAtM >= 360);
            isEarly      = !isNormal && ageAtM >= 55 && svcAtM >= 240;
            normalRetAge = svcAtM >= 360 ? 55 : 62;
            break;
          case 'contributory-post2012':
            // Normal: 60/10 yos.  Early: 55/25 yos.
            isNormal     = ageAtM >= 60 && svcAtM >= 120;
            isEarly      = !isNormal && ageAtM >= 55 && svcAtM >= 300;
            normalRetAge = 60;
            break;
          case 'contributory-pre2012':
            // Normal: 55/5 yos.  Early: any age/25 yos.  Penalty below age 55.
            isNormal     = ageAtM >= 55 && svcAtM >= 60;
            isEarly      = !isNormal && svcAtM >= 300;
            normalRetAge = 55;
            break;
          default: // noncontributory
            // Normal: 62/10 yos OR 55/30 yos.  Early: 55/20 yos.
            isNormal     = (ageAtM >= 62 && svcAtM >= 120) || (ageAtM >= 55 && svcAtM >= 360);
            isEarly      = !isNormal && ageAtM >= 55 && svcAtM >= 240;
            normalRetAge = svcAtM >= 360 ? 55 : 62;
        }

        let pension = null;
        let pensionCurrentSL = null;
        let pensionProjectedSL = null;
        if (isNormal || isEarly) {
          const yearsAhead   = Math.max(0, monthsBetween(asOfDate, retDate)) / 12;
          const effectiveAfc = raiseRate > 0
            ? afcMonthly * Math.pow(1 + raiseRate, yearsAhead)
            : afcMonthly;
          const yearsEarly = Math.max(0, normalRetAge - Math.floor(ageAtM));
          const factor     = Math.max(0, 1 - config.earlyPenalty * yearsEarly);
          pension = config.multiplier * (svcAtM / 12) * effectiveAfc * factor;

          if (slHours != null && slAsOf != null) {
            const accrualEnd   = lastDayOfSvc
              ? new Date(Math.min(lastDayOfSvc.getTime(), retDate.getTime()))
              : retDate;
            const currentMo    = sickLeaveToMonths(slHours);
            const projectedMo  = sickLeaveToMonths(
              slHours + slRate * Math.max(0, monthsBetween(slAsOf, accrualEnd))
            );
            pensionCurrentSL   = config.multiplier * ((svcAtM + currentMo)   / 12) * effectiveAfc * factor;
            pensionProjectedSL = config.multiplier * ((svcAtM + projectedMo) / 12) * effectiveAfc * factor;
          }
        }

        // Official ERS pension: no raise rate, no sick leave, month-level ARF table.
        const svcYrs    = Math.floor(svcAtM / 12);
        const svcMos    = svcAtM % 12;
        const eligAge   = officialEligAge(dob, retDate);
        const arfAge    = officialArfAge(dob, retDate);
        const offElig   = officialEligibility(plan, eligAge, svcYrs);
        const arf       = officialARF(offElig, plan, arfAge.year, arfAge.month);
        const officialPension = offElig === 'ineligible' ? null
          : Math.floor(Math.round(afcMonthly * (svcYrs + svcMos / 12) * config.multiplier * arf * 100) / 100);

        const status   = isNormal ? 'normal' : isEarly ? 'early' : 'ineligible';
        const isVested = svcAtM >= config.vestingMonths;
        rows.push({ retDate, svcAtM, ageAtM, status, pension, isVested, pensionCurrentSL, pensionProjectedSL, officialPension });

        if (status === 'normal' && !firstNormalDate) firstNormalDate = retDate;
        if (firstNormalDate && retDate >= addMonths(firstNormalDate, 120)) break;
      }

      return rows;
    }

    // ── AFC pipeline ─────────────────────────────────────────────
    function fmtMoney(v) {
      return v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    // Apply the same filters as findBestIntervals.groovy.
    // Returns { stubs, dropped } where dropped is [{ file, reason }].
    function filterStubs(paystubs) {
      const dropped = [];
      const stubs   = [];

      for (const s of paystubs) {
        if (s.documentType === 'check') {
          dropped.push({ file: s.file, reason: 'paper check' });
          continue;
        }
        if (!s.payBeginDate || !s.payEndDate) {
          dropped.push({ file: s.file, reason: 'missing dates' });
          continue;
        }
        const earnings = Object.fromEntries(
          Object.entries(s.currentEarnings ?? {}).filter(([k]) => !IGNORED.has(k))
        );
        stubs.push({
          file           : s.file,
          payBeginDate   : s.payBeginDate,
          payEndDate     : s.payEndDate,
          beginDate      : parseDate(s.payBeginDate),
          endDate        : parseDate(s.payEndDate),
          currentEarnings: earnings,
        });
      }

      stubs.sort((a, b) => a.beginDate - b.beginDate);
      return { stubs, dropped };
    }

    function generateWindows(stubs) {
      if (!stubs.length) return [];

      const firstMonth = new Date(
        stubs[0].beginDate.getFullYear(), stubs[0].beginDate.getMonth(), 1);

      // Find latest stub whose endDate is the last day of its month.
      // Scan backwards (stubs sorted by beginDate ≈ endDate order).
      const isMonthEnd = d => addDays(d, 1).getDate() === 1;
      let lastAnchorEnd = null;
      for (let i = stubs.length - 1; i >= 0; i--) {
        if (isMonthEnd(stubs[i].endDate)) { lastAnchorEnd = stubs[i].endDate; break; }
      }
      // lastMonth = window start such that its endIncl === lastAnchorEnd
      const lastMonth = lastAnchorEnd
        ? addMonths(addDays(lastAnchorEnd, 1), -12)
        : new Date(stubs[stubs.length - 1].beginDate.getFullYear(),
                   stubs[stubs.length - 1].beginDate.getMonth(), 1);

      const windows = [];
      let start = new Date(firstMonth);
      while (start <= lastMonth) {
        const endIncl  = addDays(addMonths(start, 12), -1);
        const included = stubs.filter(s => s.beginDate >= start && s.endDate <= endIncl);
        windows.push({ start: new Date(start), endIncl, stubs: included });
        start = addMonths(start, 1);
      }
      return windows;
    }

    function scoreStub(stub, mode) {
      const e = stub.currentEarnings;
      if (mode === 'regular') return e['Regular'] ?? 0;
      return Object.values(e).reduce((s, v) => s + v, 0);
    }

    // Exact DP: O(N × C²). Returns { selected, total } or null if unsolvable.
    function solveDP(windows, N) {
      const C    = windows.length;
      const dp   = Array.from({length: N + 1}, () => new Array(C).fill(null));
      const back = Array.from({length: N + 1}, () => new Array(C).fill(-1));

      for (let i = 0; i < C; i++) dp[1][i] = windows[i].score;

      for (let j = 2; j <= N; j++) {
        for (let i = 0; i < C; i++) {
          for (let k = 0; k < i; k++) {
            if (dp[j-1][k] === null) continue;
            if (windows[k].endIncl >= windows[i].start) continue; // overlap
            const candidate = dp[j-1][k] + windows[i].score;
            if (dp[j][i] === null || candidate > dp[j][i]) {
              dp[j][i] = candidate;
              back[j][i] = k;
            }
          }
        }
      }

      let bestEnd = -1, bestTotal = null;
      for (let i = 0; i < C; i++) {
        if (dp[N][i] !== null && (bestTotal === null || dp[N][i] > bestTotal)) {
          bestTotal = dp[N][i]; bestEnd = i;
        }
      }
      if (bestEnd < 0) return null;

      const selected = [];
      let idx = bestEnd;
      for (let j = N; j >= 1; j--) { selected.push(windows[idx]); idx = back[j][idx]; }
      selected.reverse();
      return { selected, total: bestTotal };
    }

    // ── Gap detection ────────────────────────────────────────────
    // Returns an array of { from, to } Date pairs for uncovered spans between stubs.
    // The expected cadence is inferred from the median pay-period length, so it
    // handles both biweekly and semi-monthly (or any other) schedules.
    function detectGaps(stubs) {
      if (stubs.length < 2) return [];

      const lengths = stubs.map(s =>
        Math.round((s.endDate - s.beginDate) / 86400000) + 1
      );
      const sorted    = [...lengths].sort((a, b) => a - b);
      const medianLen = sorted[Math.floor(sorted.length / 2)];
      const threshold = 1 + medianLen * 0.5; // more than half a period = gap

      const gaps = [];
      for (let i = 0; i < stubs.length - 1; i++) {
        const daysBetween =
          Math.round((stubs[i + 1].beginDate - stubs[i].endDate) / 86400000);
        if (daysBetween > threshold) {
          gaps.push({
            from: addDays(stubs[i].endDate, 1),
            to:   addDays(stubs[i + 1].beginDate, -1),
          });
        }
      }
      return gaps;
    }

    // ── Regular earnings display ─────────────────────────────────
    function updateRegularEarningsDisplay() {
      const lastWin = lastWindows[lastWindows.length - 1];
      if (!lastWin) return;
      const regularAvg = lastWin.stubs.reduce((sum, s) => sum + scoreStub(s, 'regular'), 0) / 12;
      const raiseRate  = parseFloat(raiseRateEl.value) / 100 || 0;
      if (raiseRate > 0) {
        const today        = new Date();
        const yearsElapsed = Math.max(0, monthsBetween(lastWin.endIncl, today)) / 12;
        const projected    = regularAvg * Math.pow(1 + raiseRate, yearsElapsed);
        regularEarningsEl.textContent =
          `Regular avg earnings (${fmtDate(lastWin.start)} – ${fmtDate(lastWin.endIncl)}): $${fmtMoney(regularAvg)}/mo → now: $${fmtMoney(projected)}/mo`;
      } else {
        regularEarningsEl.textContent =
          `Regular avg earnings (${fmtDate(lastWin.start)} – ${fmtDate(lastWin.endIncl)}): $${fmtMoney(regularAvg)}/mo`;
      }
    }

    // ── AFC computation ──────────────────────────────────────────
    function computeAndFillAfc(planKey = planEl.value) {
      const config = PLAN_CONFIGS[planKey];
      if (!config || !lastWindows.length) return null;
      const scored = lastWindows.map(w => ({
        ...w,
        score: w.stubs.reduce((sum, s) => sum + scoreStub(s, config.mode), 0),
      }));
      const result = solveDP(scored, config.N);
      if (!result) return null;
      manualAfcEl.value = (result.total / config.N / 12).toFixed(2);
      return { selected: result.selected, config };
    }

    function renderWindowsSection(selected, config) {
      const lines = [
        `Best ${config.N} window${config.N !== 1 ? 's' : ''} (${config.mode} pay):`,
        ...selected.map(w =>
          `  ${fmtDate(w.start)} – ${fmtDate(w.endIncl)}   $${fmtMoney(w.score / 12)}/mo avg`
        ),
      ];
      const pre = document.createElement('pre');
      pre.className   = 'filter-summary windows-section';
      pre.textContent = lines.join('\n');
      return pre;
    }

    // ── Display helpers ──────────────────────────────────────────
    // Serialize to JSON with monetary values formatted to exactly 2 decimal places,
    // matching Groovy's BigDecimal serialization (e.g. 4413.00 not 4413).
    function toJson(obj) {
      return JSON.stringify(obj, (_key, val) => {
        if (typeof val === 'number') return `§${val.toFixed(2)}§`;
        return val;
      }, 4).replace(/"§(.+?)§"/g, '$1');
    }

    async function populateOutput(file, output) {
      output.textContent = 'Loading…';
      output.hidden      = false;

      try {
        const result   = await extractPaystub(file);
        const rows     = result._rows;
        const warnings = result._warnings;
        delete result._rows; delete result._block; delete result._warnings;

        if (warnings.length) result.warnings = warnings;

        output.textContent = '';

        const jsonEl = document.createElement('pre');
        jsonEl.className   = 'fields-out';
        jsonEl.textContent = toJson(result);
        output.appendChild(jsonEl);

        const toggleBtn = document.createElement('button');
        toggleBtn.className   = 'toggle-rows';
        toggleBtn.textContent = 'show rows ▶';
        output.appendChild(toggleBtn);

        const dumpEl = document.createElement('pre');
        dumpEl.className   = 'dump-out';
        dumpEl.hidden      = true;
        dumpEl.textContent = rows.map(r => rowToString(r.items)).join('\n');
        output.appendChild(dumpEl);

        toggleBtn.addEventListener('click', () => {
          dumpEl.hidden = !dumpEl.hidden;
          toggleBtn.textContent = dumpEl.hidden ? 'show rows ▶' : 'hide rows ▼';
        });

        output.dataset.parsed = '1';
      } catch (err) {
        output.textContent = `ERROR: ${err.message}`;
      }
    }

    function makeFileEntry(file) {
      const li = document.createElement('li');

      const link = document.createElement('span');
      link.className   = 'file-link';
      link.textContent = file.webkitRelativePath;

      const output = document.createElement('div');
      output.className = 'file-output';
      output.hidden    = true;

      link.addEventListener('click', async () => {
        if (output.hidden) {
          if (!output.dataset.parsed) await populateOutput(file, output);
          output.hidden = false;
        } else {
          output.hidden = true;
        }
      });

      li.appendChild(link);
      li.appendChild(output);
      return li;
    }

    // Accepts the <ul> element as a parameter (not a global #files query).
    async function expandAll(listEl) {
      const btn = document.getElementById('expand-all');
      btn.disabled = true;
      const entries = listEl.querySelectorAll('li');
      for (let i = 0; i < entries.length; i++) {
        btn.textContent = `Expanding… ${i + 1} / ${entries.length}`;
        const li     = entries[i];
        const output = li.querySelector('.file-output');
        const path   = li.querySelector('.file-link').textContent;
        if (!output.dataset.parsed) await populateOutput(pdfFiles[path], output);
        output.hidden = false;
      }
      btn.textContent = 'Expand all';
      btn.disabled    = false;
    }

    // Returns a DOM element placed into #debug-body.
    function showFilterSummary(total, stubs, dropped, errors, windows = []) {
      const wrapper = document.createElement('div');
      wrapper.className = 'filter-summary';

      const topPre = document.createElement('pre');
      topPre.textContent = [
        `Total processed:    ${total}`,
        `Ignored types:`,
      ].join('\n');
      wrapper.appendChild(topPre);

      const ul = document.createElement('ul');
      for (const t of IGNORED) {
        const li = document.createElement('li');
        li.textContent = t;
        ul.appendChild(li);
      }
      wrapper.appendChild(ul);

      const tailLines = [];
      if (windows.length) {
        const w0 = windows[0];
        const wN = windows[windows.length - 1];
        tailLines.push('');
        tailLines.push(`Candidate windows:  ${windows.length}`);
        tailLines.push(`First window:       ${fmtDate(w0.start)} – ${fmtDate(w0.endIncl)}`);
        tailLines.push(`Last window:        ${fmtDate(wN.start)} – ${fmtDate(wN.endIncl)}`);
      }

      const problems = [
        ...dropped.map(d => `  ${d.file}  (${d.reason})`),
        ...errors.map(e  => `  ${e.file}  (extraction error: ${e.error})`),
      ];
      if (problems.length) {
        tailLines.push('', `Problematic files (${problems.length}):`);
        tailLines.push(...problems);
      }

      if (tailLines.length) {
        const tailPre = document.createElement('pre');
        tailPre.textContent = tailLines.join('\n');
        wrapper.appendChild(tailPre);
      }

      return wrapper;
    }

    // ── State ────────────────────────────────────────────────────
    // Tracks the last committed plan value so we can revert on cancel.
    let prevPlanValue = '';

    // ── Reactive calculate logic ──────────────────────────────────
    function canCalculate() {
      const group1Ok = !!(
        planEl.value &&
        dobEl.value &&
        (lastDayEl.value || svcAsOfEl.value)
      );
      return group1Ok && parseFloat(manualAfcEl.value) > 0;
    }

    function maybeCalculate() {
      if (canCalculate()) runCalculate(); else drawChart();
    }

    [dobEl, svcYearsEl, svcMonthsEl, svcAsOfEl, lastDayEl, slHoursEl, slRateEl].forEach(el =>
      el.addEventListener('input', maybeCalculate)
    );
    manualAfcEl.addEventListener('change', maybeCalculate);
    raiseRateEl.addEventListener('input', () => {
      updateRegularEarningsDisplay();
      maybeCalculate();
      updateReloadLink();
    });

    function runCalculate() {
      const lastDayVal   = lastDayEl.value;
      const lastDayOfSvc = lastDayVal ? parseIsoDate(lastDayVal) : null;
      const asOfDate     = lastDayOfSvc ?? parseIsoDate(svcAsOfEl.value);

      const slHours  = parseFloat(slHoursEl.value);
      const raiseRate = parseFloat(raiseRateEl.value) / 100 || 0;
      const series  = calculateSeries({
        plan             : planEl.value,
        dob              : parseIsoDate(dobEl.value),
        enteredSvcMonths : (parseInt(svcYearsEl.value) || 0) * 12 + (parseInt(svcMonthsEl.value) || 0),
        asOfDate,
        lastDayOfSvc,
        afcMonthly       : parseFloat(manualAfcEl.value),
        slHours          : isNaN(slHours) || slHours <= 0 ? null : slHours,
        slRate           : parseFloat(slRateEl.value) || 14,
        slAsOf           : asOfDate,
        raiseRate,
      });
      window._debug.lastSeries = series;
      const eligible = series.filter(d => d.pension !== null);
      statusLine.textContent = eligible.length === 0
        ? 'No eligible retirement dates found.' : '';
      drawChart(series);
    }

    function runClear() {
      // Form inputs
      [planEl, dobEl, svcYearsEl, svcMonthsEl, svcAsOfEl, lastDayEl, manualAfcEl, slHoursEl, raiseRateEl]
        .forEach(el => { el.value = ''; });
      slRateEl.value = '14';

      // PDF picker state
      pdfFiles        = {};
      lastStubs       = [];
      lastWindows     = [];
      cancelRequested = false;

      // Picker UI
      pickerEl.value           = '';
      pickerPath.textContent   = '';
      afcComputedEl.textContent     = '';
      afcDateRange.textContent      = '';
      regularEarningsEl.textContent = '';
      gapWarningsEl.innerHTML       = '';

      // Debug panel
      debugDetails.open = false;
      debugDetails.classList.add('disabled');
      debugPanelEl.hidden = true;
      debugBody.innerHTML = '';

      // Group 2 fieldset, prevPlanValue, status line
      earningsFieldset.disabled  = true;
      prevPlanValue              = '';
      statusLine.textContent     = '';

      // "As of" field visibility
      syncAsOfVisibility();

      updateReloadLink();
      drawChart();
    }

    clearBtn.addEventListener('click', runClear);

    planEl.addEventListener('input', () => {
      const newVal = planEl.value;

      if (manualAfcEl.value.trim() && newVal && lastWindows.length) {
        if (!confirm('Changing the plan will recompute your Monthly AFC. Continue?')) {
          planEl.value = prevPlanValue;
          earningsFieldset.disabled = !prevPlanValue;
          updateReloadLink();
          maybeCalculate();
          return;
        }
      }

      prevPlanValue = newVal;
      earningsFieldset.disabled = !newVal;
      const dpResult = computeAndFillAfc(newVal);
      if (dpResult) {
        const existing = debugBody.querySelector('.windows-section');
        const section  = renderWindowsSection(dpResult.selected, dpResult.config);
        if (existing) existing.replaceWith(section);
        else if (debugBody.children.length) debugBody.appendChild(section);
      }
      updateReloadLink();
      maybeCalculate();
    });

    // ── "As of" visibility: shown when lastDay blank, hidden when filled ─
    function syncAsOfVisibility() {
      svcAsOfField.hidden = !!lastDayEl.value;
    }

    lastDayEl.addEventListener('input', syncAsOfVisibility);

    // ── Last-day-of-service clear button ─────────────────────────
    lastDayClearBtn.addEventListener('click', () => {
      lastDayEl.value = '';
      syncAsOfVisibility();
      updateReloadLink();
      maybeCalculate();
    });

    // ── Reload link ──────────────────────────────────────────────
    function buildReloadUrl() {
      const params = new URLSearchParams();
      const add = (key, el) => { if (el.value) params.set(key, el.value); };
      add('plan',      planEl);
      add('dob',       dobEl);
      add('svcYears',  svcYearsEl);
      add('svcMonths', svcMonthsEl);
      add('svcAsOf',   svcAsOfEl);
      add('lastDay',   lastDayEl);
      add('afc',       manualAfcEl);
      add('slHours',    slHoursEl);
      if (slRateEl.value && slRateEl.value !== '14') add('slRate', slRateEl);
      add('raiseRate',  raiseRateEl);
      const qs = params.toString();
      return window.location.pathname + (qs ? '?' + qs : '');
    }

    function updateReloadLink() {
      reloadLink.href = buildReloadUrl();
    }

    [dobEl, svcYearsEl, svcMonthsEl, svcAsOfEl, lastDayEl, slHoursEl, slRateEl].forEach(el =>
      el.addEventListener('input', updateReloadLink)
    );
    // raiseRateEl updateReloadLink is handled in its own listener above
    manualAfcEl.addEventListener('change', updateReloadLink);

    function commitAfc(e) {
      if (e.type === 'keydown' && e.key !== 'Enter') return;
      if (e.type === 'input'   && e.inputType === 'deleteByCut') {
        manualAfcEl.value = '';
        updateReloadLink();
        drawChart();
        return;
      }
      if (e.type === 'input'   && e.inputType !== 'insertFromPaste') return;
      updateReloadLink();
      maybeCalculate();
    }
    manualAfcEl.addEventListener('keydown', commitAfc);
    manualAfcEl.addEventListener('input',   commitAfc);

    // ── URL parameter pre-fill ────────────────────────────────────
    // Supported params: plan, dob, svcYears, svcMonths, lastDay, afc
    // Example: ?plan=hybrid-post2012&dob=1975-06-15&svcYears=15&svcMonths=3&afc=4500
    {
      const p = new URLSearchParams(window.location.search);
      const set = (el, key) => { if (p.has(key)) el.value = p.get(key); };
      set(planEl,      'plan');
      set(dobEl,       'dob');
      set(svcYearsEl,  'svcYears');
      set(svcMonthsEl, 'svcMonths');
      set(svcAsOfEl,   'svcAsOf');
      set(lastDayEl,   'lastDay');
      set(manualAfcEl, 'afc');
      set(slHoursEl,   'slHours');
      set(slRateEl,    'slRate');
      set(raiseRateEl, 'raiseRate');
      prevPlanValue             = planEl.value;
      earningsFieldset.disabled = !planEl.value;
      syncAsOfVisibility();
      updateReloadLink();
      if (canCalculate()) requestAnimationFrame(runCalculate);
    }
    // ── Chart ────────────────────────────────────────────────────
    function drawChart(series = null) {
      const svg = d3.select('#chart-svg');
      const W   = svg.node().clientWidth;
      const H   = svg.node().clientHeight;

      const margin = { top: 24, right: 20, bottom: 52, left: 62 };
      const iW = W - margin.left - margin.right;
      const iH = H - margin.top  - margin.bottom;

      svg.selectAll('*').remove();

      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      // ── Scales ─────────────────────────────────────────────────
      const today = new Date();
      const fallbackXMin = new Date(today.getFullYear(), today.getMonth() + 1, 1);
      const fallbackXMax = new Date(today.getFullYear() + 15, today.getMonth() + 1, 1);

      const xMin = series ? series[0].retDate                 : fallbackXMin;
      const xMax = series ? series[series.length - 1].retDate : fallbackXMax;

      const eligible = series ? series.filter(d => d.pension !== null) : [];
      const yMin = eligible.length
        ? Math.floor(Math.min(...eligible.map(d => d.pension)) / 1000) * 1000
        : 0;
      const yMax = eligible.length
        ? Math.ceil(Math.max(...eligible.flatMap(d =>
            [d.pension, d.pensionCurrentSL, d.pensionProjectedSL].filter(v => v != null)
          )) / 1000) * 1000
        : 5000;

      const xScale = d3.scaleTime().domain([xMin, xMax]).range([0, iW]);
      const yScale = d3.scaleLinear().domain([yMin, yMax]).range([iH, 0]);

      // ── Tick values ─────────────────────────────────────────────
      const xMajorVals = [], xMinorVals = [];
      for (let yr = xMin.getFullYear(); yr <= xMax.getFullYear() + 1; yr++) {
        const jan1 = new Date(yr, 0, 1);
        if (jan1 >= xMin && jan1 <= xMax) xMajorVals.push(jan1);
        for (const mo of [2, 4, 6, 8, 10]) {   // Mar, May, Jul, Sep, Nov
          const d = new Date(yr, mo, 1);
          if (d >= xMin && d <= xMax) xMinorVals.push(d);
        }
      }
      const yMajorVals = d3.range(yMin, yMax + 1, 1000);
      const yMinorVals = d3.range(yMin, yMax + 1, 100).filter(v => v % 1000 !== 0);

      // ── Ineligible region shading ───────────────────────────────
      if (series && series.length) {
        const firstVested   = series.find(d => d.isVested);
        const firstEligible = series.find(d => d.pension !== null);
        const vestedX   = firstVested   ? xScale(firstVested.retDate)   : iW;
        const eligibleX = firstEligible ? xScale(firstEligible.retDate) : iW;

        // Not yet vested
        if (vestedX > 0) {
          g.append('rect')
            .attr('x', 0).attr('y', 0)
            .attr('width', vestedX).attr('height', iH)
            .attr('fill', CHART.colorNotVested);
          if (vestedX > 30) {
            g.append('text')
              .attr('transform', `translate(${vestedX / 2},${iH / 2}) rotate(-90)`)
              .attr('text-anchor', 'middle')
              .attr('font-family', CHART.font).attr('font-size', '0.75rem')
              .attr('fill', CHART.colorMinor)
              .text('Not yet vested');
          }
        }

        // Vested but not yet eligible to collect
        if (eligibleX > vestedX) {
          g.append('rect')
            .attr('x', vestedX).attr('y', 0)
            .attr('width', eligibleX - vestedX).attr('height', iH)
            .attr('fill', CHART.colorIneligible);
          if (eligibleX - vestedX > 30) {
            const midX = vestedX + (eligibleX - vestedX) / 2;
            g.append('text')
              .attr('transform', `translate(${midX},${iH / 2}) rotate(-90)`)
              .attr('text-anchor', 'middle')
              .attr('font-family', CHART.font).attr('font-size', '0.75rem')
              .attr('fill', CHART.colorMinor)
              .text('Not yet eligible');
          }
        }
      }

      // ── X axis (retirement date) ────────────────────────────────
      g.append('g').selectAll('line').data(xMajorVals).join('line')
        .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
        .attr('y1', 0).attr('y2', iH)
        .attr('stroke', CHART.colorGrid).attr('stroke-width', 1);

      g.append('g').selectAll('line').data(xMajorVals).join('line')
        .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
        .attr('y1', iH).attr('y2', iH + 6)
        .attr('stroke', CHART.colorAxis).attr('stroke-width', 1);

      g.append('g').selectAll('text').data(xMajorVals).join('text')
        .attr('x', d => xScale(d)).attr('y', iH + 18)
        .attr('text-anchor', 'middle')
        .attr('font-family', CHART.font).attr('font-size', '0.75rem').attr('fill', CHART.colorLabel)
        .text(d => d.getFullYear());

      g.append('g').selectAll('line').data(xMinorVals).join('line')
        .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
        .attr('y1', iH).attr('y2', iH + 3)
        .attr('stroke', CHART.colorMinor).attr('stroke-width', 0.5);

      // ── Y axis (monthly pension) ────────────────────────────────
      g.append('g').selectAll('line').data(yMajorVals).join('line')
        .attr('x1', 0).attr('x2', iW)
        .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
        .attr('stroke', CHART.colorGrid).attr('stroke-width', 1);

      g.append('g').selectAll('line').data(yMajorVals).join('line')
        .attr('x1', -6).attr('x2', 0)
        .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
        .attr('stroke', CHART.colorAxis).attr('stroke-width', 1);

      g.append('g').selectAll('text').data(yMajorVals).join('text')
        .attr('x', -10).attr('y', d => yScale(d))
        .attr('dy', '0.32em').attr('text-anchor', 'end')
        .attr('font-family', CHART.font).attr('font-size', '0.75rem').attr('fill', CHART.colorLabel)
        .text(d => d === 0 ? '$0' : `$${d / 1000}k`);

      g.append('g').selectAll('line').data(yMinorVals).join('line')
        .attr('x1', -3).attr('x2', 0)
        .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
        .attr('stroke', CHART.colorMinor).attr('stroke-width', 0.5);

      // ── Curve ───────────────────────────────────────────────────
      if (series && series.length) {
        svg.append('defs').append('clipPath').attr('id', 'plot-clip')
          .append('rect').attr('width', iW).attr('height', iH);

        const makeCurve = (accessor, color, dashArray = null) => {
          const line = d3.line()
            .defined(d => accessor(d) != null)
            .x(d => xScale(d.retDate))
            .y(d => yScale(accessor(d)));
          const path = g.append('g').attr('clip-path', 'url(#plot-clip)')
            .append('path')
            .datum(series)
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', 1.5)
            .attr('d', line);
          if (dashArray) path.attr('stroke-dasharray', dashArray);
        };

        makeCurve(d => d.pensionProjectedSL, CHART.colorSLProjected, '4,3');
        makeCurve(d => d.pensionCurrentSL,   CHART.colorSLCurrent);
        makeCurve(d => d.pension,            CHART.colorLine);
      }

      // ── Axis baselines ──────────────────────────────────────────
      g.append('line')
        .attr('x1', 0).attr('x2', iW).attr('y1', iH).attr('y2', iH)
        .attr('stroke', CHART.colorAxis).attr('stroke-width', 1);
      g.append('line')
        .attr('x1', 0).attr('x2', 0).attr('y1', 0).attr('y2', iH)
        .attr('stroke', CHART.colorAxis).attr('stroke-width', 1);

      // ── Axis labels ─────────────────────────────────────────────
      g.append('text')
        .attr('x', iW / 2).attr('y', iH + 42)
        .attr('text-anchor', 'middle')
        .attr('font-family', CHART.font).attr('font-size', '0.8rem').attr('fill', CHART.colorLabel)
        .text('Retirement Date');

      g.append('text')
        .attr('transform', `translate(${-(margin.left - 14)},${iH / 2}) rotate(-90)`)
        .attr('text-anchor', 'middle')
        .attr('font-family', CHART.font).attr('font-size', '0.8rem').attr('fill', CHART.colorLabel)
        .text('Monthly Pension — Maximum Allowance ($/month)');

      // ── Chart title ─────────────────────────────────────────────
      svg.append('text')
        .attr('x', margin.left + iW / 2).attr('y', 16)
        .attr('text-anchor', 'middle')
        .attr('font-family', CHART.font).attr('font-size', '0.85rem').attr('font-weight', 'bold')
        .attr('fill', CHART.colorTitle)
        .text('ERS Monthly Pension vs. Retirement Date');

      // ── Tooltip ──────────────────────────────────────────────────
      if (eligible.length) {
        const bisect   = d3.bisector(d => d.retDate).left;
        const colaRate = PLAN_CONFIGS[planEl.value]?.colaRate ?? 0;
        const colaLine = d3.line().x(p => p.x).y(p => p.y);

        const tip = g.append('g').attr('display', 'none');

        tip.append('line').attr('class', 'tip-v')
          .attr('y1', 0).attr('y2', iH)
          .attr('stroke', CHART.colorCrosshair).attr('stroke-width', 1).attr('stroke-dasharray', '4,3');

        tip.append('line').attr('class', 'tip-h')
          .attr('x1', 0).attr('x2', iW)
          .attr('stroke', CHART.colorCrosshair).attr('stroke-width', 1).attr('stroke-dasharray', '4,3');

        tip.append('circle').attr('class', 'tip-dot')
          .attr('r', 3.5).attr('fill', CHART.colorLine);

        tip.append('circle').attr('class', 'tip-dot-sl-current')
          .attr('r', 3.5).attr('fill', CHART.colorSLCurrent).attr('display', 'none');

        tip.append('circle').attr('class', 'tip-dot-sl-projected')
          .attr('r', 3.5).attr('fill', CHART.colorSLProjected).attr('display', 'none');

        const colaPath = tip.append('g').attr('clip-path', 'url(#plot-clip)')
          .append('path')
          .attr('fill', 'none')
          .attr('stroke', CHART.colorCola)
          .attr('stroke-width', 1.5)
          .attr('stroke-dasharray', '4,3');

        const tipLabel = tip.append('g');
        const tipRect  = tipLabel.append('rect')
          .attr('fill', 'white').attr('stroke', CHART.colorMinor).attr('rx', 3);
        const tipText  = tipLabel.append('text')
          .attr('font-family', CHART.font).attr('font-size', '0.75rem')
          .attr('fill', CHART.colorTitle).attr('dominant-baseline', 'hanging');

        // Transparent overlay — must be last so it sits on top for event capture.
        g.append('rect')
          .attr('width', iW).attr('height', iH)
          .attr('fill', 'none').attr('pointer-events', 'all')
          .on('mousemove', function(event) {
            const [mx, my] = d3.pointer(event);
            const hoverDate = xScale.invert(mx);

            let idx = bisect(eligible, hoverDate);
            if (idx >= eligible.length) idx = eligible.length - 1;
            if (idx > 0 &&
                Math.abs(eligible[idx - 1].retDate - hoverDate) <
                Math.abs(eligible[idx].retDate - hoverDate)) idx--;
            const pt = eligible[idx];

            const px = xScale(pt.retDate);

            // All dots — shown on every active curve for context
            const hasSL = pt.pensionCurrentSL != null;
            tip.select('.tip-dot')
              .attr('cx', px).attr('cy', yScale(pt.pension));
            tip.select('.tip-dot-sl-current')
              .attr('cx', px).attr('cy', hasSL ? yScale(pt.pensionCurrentSL)  : 0)
              .attr('display', hasSL ? null : 'none');
            tip.select('.tip-dot-sl-projected')
              .attr('cx', px).attr('cy', hasSL ? yScale(pt.pensionProjectedSL) : 0)
              .attr('display', hasSL ? null : 'none');

            // Pick the curve closest to the cursor's Y position
            const candidates = [
              { pension: pt.pension,            label: '',           color: CHART.colorTitle },
              ...(hasSL ? [
                { pension: pt.pensionCurrentSL,   label: ' (+ cur. SL)',  color: CHART.colorSLCurrent   },
                { pension: pt.pensionProjectedSL, label: ' (+ proj. SL)', color: CHART.colorSLProjected },
              ] : []),
            ];
            const closest = candidates.reduce((best, c) =>
              Math.abs(yScale(c.pension) - my) < Math.abs(yScale(best.pension) - my) ? c : best
            );
            const cy = yScale(closest.pension);

            // COLA projection anchored to the closest curve
            const colaPoints = [];
            for (let m = 0; m <= 240; m++) {
              const d = addMonths(pt.retDate, m);
              colaPoints.push({
                x: xScale(d),
                y: yScale(closest.pension * Math.pow(1 + colaRate, m / 12)),
              });
            }
            colaPath.attr('d', colaLine(colaPoints));

            tip.select('.tip-v').attr('x1', px).attr('x2', px);
            tip.select('.tip-h').attr('y1', cy).attr('y2', cy);

            const fmt = v => Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            tipText.selectAll('tspan').remove();
            tipText.append('tspan').attr('dy', 0).attr('fill', closest.color)
              .text(`${MONTHS[pt.retDate.getMonth()]} ${pt.retDate.getFullYear()} — $${fmt(closest.pension)}/mo${closest.label}`);

            const pad = 6;
            const bb  = tipText.node().getBBox();
            const lw  = bb.width  + pad * 2;
            const lh  = bb.height + pad * 2;
            const lx  = px + 12 + lw > iW ? px - 12 - lw : px + 12;
            const ly  = Math.max(0, Math.min(iH - lh, cy - lh / 2));

            tipRect.attr('x', lx).attr('y', ly).attr('width', lw).attr('height', lh);
            tipText.attr('x', lx + pad).attr('y', ly + pad);
            tipText.selectAll('tspan').attr('x', lx + pad);

            tip.attr('display', null);
          })
          .on('mouseleave', () => tip.attr('display', 'none'));
      }
    }

    drawChart();
  </script>
</body>
</html>
